# Research Agent Configuration
# Main configuration file for the 3-tier RAG research system

# System Configuration
system:
  name: "Research Agent System"
  version: "0.1.0"
  description: "Advanced research agent with 3-tier RAG, literature search, and PromptChain orchestration"

# Literature Search Configuration
literature_search:
  # Available sources: sci_hub, arxiv, pubmed
  enabled_sources:
    - sci_hub
    - arxiv
    - pubmed
  
  # Sci-Hub MCP Configuration
  sci_hub:
    enabled: true
    timeout: 120  # seconds
    rate_limit: 10  # requests per minute
    retry_attempts: 3
    cache_pdfs: true
    pdf_storage: "./data/cache/pdfs"
  
  # ArXiv Configuration
  arxiv:
    enabled: true
    timeout: 30
    rate_limit: 30  # requests per minute
    categories:
      - "cs.AI"
      - "cs.CL" 
      - "cs.LG"
      - "stat.ML"
      - "q-bio"
    max_results: 50
  
  # PubMed Configuration
  pubmed:
    enabled: true
    timeout: 30
    rate_limit: 10  # requests per second
    email: "${OPENALEX_EMAIL}"  # Required for PubMed
    tool_name: "research-agent"
    max_results: 50

# 3-Tier RAG System Configuration
three_tier_rag:
  # Execution mode: sequential, parallel, adaptive
  execution_mode: "sequential"
  
  # Tier 1: LightRAG (Entity Extraction)
  tier1_lightrag:
    enabled: true
    mode: "ollama"  # cloud, ollama, hybrid
    
    # Cloud API Configuration
    cloud:
      llm_model: "gpt-4o-mini"
      embedding_model: "text-embedding-3-large"
      temperature: 0.1
      
    # Ollama Configuration
    ollama:
      host: "http://localhost:11434"
      llm_model: "mistral-nemo:latest"
      embedding_model: "bge-m3:latest"
      embedding_dim: 1024
      context_window: 16384
      
    # LightRAG Processing Settings
    processing:
      chunk_size: 1200
      chunk_overlap: 100
      max_parallel_insert: 2
      llm_model_max_async: 4
      entity_extract_max_gleaning: 1
      working_dir: "./data/lightrag_working"
      
    # PDF Processing
    pdf_processing:
      use_textract: true
      extract_images: false
      extract_tables: true
      ocr_enabled: false
  
  # Tier 2: PaperQA2 (Research Analysis)
  tier2_paperqa2:
    enabled: true
    mode: "ollama"  # cloud, ollama
    
    # Cloud API Configuration
    cloud:
      llm: "gpt-4o-2024-11-20"
      summary_llm: "gpt-4o-2024-11-20"
      embedding: "text-embedding-3-small"
      temperature: 0.0
      
    # Ollama Configuration
    ollama:
      llm: "ollama/llama3.2"
      summary_llm: "ollama/llama3.2"
      embedding: "ollama/mxbai-embed-large"
      api_base: "http://localhost:11434"
      
    # PaperQA2 Settings
    settings:
      batch_size: 1
      verbosity: 1
      answer:
        evidence_k: 10
        evidence_detailed_citations: true
        evidence_retrieval: true
        evidence_summary_length: "about 100 words"
        answer_max_sources: 5
        answer_length: "about 200 words, but can be longer"
        max_concurrent_requests: 4
      parsing:
        chunk_size: 5000
        overlap: 250
        page_size_limit: "1,280,000"
        use_doc_details: true
        
    # Paper Processing
    paper_processing:
      auto_citation: true
      auto_metadata: true
      pdf_parsing: "grobid"  # grobid, textract, pymupdf
      
  # Tier 3: GraphRAG (Knowledge Graph Reasoning)
  tier3_graphrag:
    enabled: true
    mode: "ollama"  # cloud, ollama
    
    # Cloud API Configuration
    cloud:
      extraction_model: "gpt-4o-mini"
      query_model: "gpt-4"
      embedding_model: "text-embedding-3-large"
      
    # Ollama Configuration
    ollama:
      extraction_model: "llama3.2"
      query_model: "mistral"
      embedding_model: "bge-m3"
      api_base: "http://localhost:11434"
      
    # GraphRAG Settings
    settings:
      max_retries: 20
      chunk_size: 300
      chunk_overlap: 100
      entity_types:
        - "organization"
        - "person" 
        - "geo"
        - "event"
        - "concept"
        - "method"
      max_gleanings: 1
      
    # Graph Processing
    graph_processing:
      community_detection: true
      max_data_tokens: 12000
      concurrent_coroutines: 32
      json_mode: true

# PromptChain Integration - Advanced Multi-Agent Research System
promptchain:
  # Main Agent Chain Configuration
  agent_chain:
    execution_mode: "pipeline"  # Sequential execution for research workflow
    max_agents: 10
    cache_enabled: true
    cache_name: "research_session"
    cache_path: "./data/cache"
    verbose: true
    
  # Advanced Research Agents
  agents:
    # Phase 1: Query Generation
    query_generator:
      model: "openai/gpt-4o"
      type: "agentic"
      instructions:
        - "Analyze research topic: {topic}"
        - "Generate 8-12 specific research questions covering different aspects"
        - "Format as structured query list with priority scores"
      processor:
        type: "agentic_step"
        objective: "Generate comprehensive research questions for multi-query processing"
        max_internal_steps: 5
      tools:
        - "topic_analysis"
        - "question_generation"
        - "priority_scoring"
        
    # Phase 2: Search Strategy
    search_strategist:
      model: "openai/gpt-4o-mini"
      type: "agentic"
      instructions:
        - "Current queries: {queries}"
        - "Previous findings: {findings}"
        - "Determine optimal search strategy and keywords"
        - "Generate search terms for Sci-Hub, ArXiv, and PubMed"
      processor:
        type: "agentic_step"
        objective: "Optimize search strategy based on queries and current findings"
        max_internal_steps: 3
      tools:
        - "search_optimization"
        - "keyword_generation"
        - "database_selection"
        
    # Phase 3: Literature Search
    literature_searcher:
      model: "openai/gpt-4o-mini"
      type: "function_calling"
      instructions:
        - "Execute search strategy: {strategy}"
        - "Find relevant papers using multiple sources"
        - "Collect and validate paper metadata"
      tools:
        - "mcp_scihub_search_by_keyword"
        - "mcp_scihub_search_by_title"
        - "arxiv_search"
        - "pubmed_search"
        - "paper_validation"
        - "metadata_extraction"
        
    # Phase 4: Multi-Query Coordination
    multi_query_coordinator:
      model: "anthropic/claude-3-sonnet-20240229"
      type: "orchestrator"
      instructions:
        - "Coordinate processing of papers across all tiers"
        - "Manage multiple queries simultaneously"
        - "Aggregate results from all processing tiers"
      processor:
        type: "custom"
        class: "MultiQueryCoordinator"
      tools:
        - "tier_coordination"
        - "result_aggregation"
        - "progress_tracking"
        
    # Phase 5: ReAct Analysis
    react_analyzer:
      model: "anthropic/claude-3-5-sonnet-20240620"
      type: "agentic"
      instructions:
        - "Analyze multi-tier results: {results}"
        - "Identify research gaps and coverage issues"
        - "Determine if additional queries are needed"
        - "Generate new queries or mark research as complete"
      processor:
        type: "agentic_step"
        objective: "Perform ReAct-style gap analysis and iterative query generation"
        max_internal_steps: 7
      tools:
        - "gap_detection"
        - "coverage_analysis"
        - "query_generation"
        - "completeness_assessment"
        
    # Phase 6: Synthesis
    synthesis_agent:
      model: "openai/gpt-4o"
      type: "agentic"
      instructions:
        - "All research findings: {findings}"
        - "Original research topic: {topic}"
        - "Synthesize comprehensive literature review"
        - "Include cross-cutting themes and statistical analysis"
      processor:
        type: "agentic_step"  
        objective: "Synthesize comprehensive literature review with sections, statistics, and analysis"
        max_internal_steps: 10
        store_steps: true
      tools:
        - "literature_synthesis"
        - "statistical_analysis"
        - "citation_analysis"
        - "document_generation"
        
    # Phase 7: Interactive Chat
    chat_interface:
      model: "openai/gpt-4o"
      type: "interactive"
      instructions:
        - "Handle follow-up questions about research: {question}"
        - "Generate addenda to literature review"
        - "Assist with document export and formatting"
      tools:
        - "intent_classification"
        - "follow_up_processing"
        - "addendum_generation"
        - "document_export"
        
  # Router Configuration for Interactive Mode
  router:
    model: "openai/gpt-4o-mini"
    decision_templates:
      research_workflow_dispatch: |
        User input: {user_input}
        Current research phase: {current_phase}
        Session status: {session_status}
        
        Available phases:
        1. new_research - Start new research topic
        2. continue_research - Continue existing research session
        3. follow_up_question - Ask question about existing research
        4. request_analysis - Request specific analysis
        5. generate_queries - Generate additional queries
        6. export_document - Export/update literature review
        7. interactive_chat - Enter chat mode
        
        Choose phase and agent: {"phase": "phase_name", "agent": "agent_name", "refined_input": "optional refined input"}
        
      chat_mode_dispatch: |
        User input in chat mode: {user_input}
        Current research session: {research_session}
        Chat history: {chat_history}
        
        Available actions:
        1. follow_up - Answer follow-up question using existing research
        2. expand_search - Find additional papers for specific aspect
        3. add_section - Add new section to literature review
        4. update_analysis - Update existing analysis
        5. export_format - Export in specific format
        6. end_session - Complete research session
        
        Choose action: {"action": "action_name", "parameters": {...}}

# Research Session Management
research_session:
  # Session Configuration
  max_iterations: 5
  max_queries_per_iteration: 15
  min_papers_per_query: 5
  max_papers_total: 100
  
  # Quality Thresholds
  completeness_threshold: 0.85
  gap_detection_threshold: 0.7
  citation_minimum: 3
  
  # Session Persistence
  save_intermediate_results: true
  session_timeout: 7200  # 2 hours
  auto_save_interval: 300  # 5 minutes

# MCP Server Configuration
mcp_servers:
  # Context7 for library documentation
  context7:
    enabled: true
    server_type: "context7"
    
  # Gemini for pair programming  
  gemini:
    enabled: true
    server_type: "gemini_mcp_server"
    
  # Git for version tracking
  git:
    enabled: true
    server_type: "git"
    
  # Sci-Hub MCP
  scihub:
    enabled: true
    server_type: "stdio"
    command: "uv"
    args: ["run", "fastmcp", "dev", "sci_hub_server.py"]
    cwd: "./integrations/scihub_mcp"

# Caching Configuration
caching:
  enabled: true
  
  # Memory Cache
  memory:
    size_mb: 500
    ttl_seconds: 3600
    
  # Disk Cache
  disk:
    enabled: true
    directory: "./data/cache"
    size_mb: 2000
    cleanup_interval: 86400
    
  # Redis Cache (optional)
  redis:
    enabled: false
    url: "${REDIS_URL}"
    ttl_seconds: 86400
    
  # Database Cache
  database:
    enabled: true
    path: "./data/research_cache.db"
    session_timeout: 3600

# Report Generation
report_generation:
  # Output formats
  formats:
    - "markdown"
    - "html" 
    - "pdf"
    - "json"
    
  # Report sections
  sections:
    executive_summary: true
    methodology: true
    findings: true
    statistics: true
    visualizations: true
    references: true
    appendix: false
    
  # Statistics and Analytics
  statistics:
    paper_count: true
    citation_analysis: true
    temporal_analysis: true
    keyword_frequency: true
    author_networks: true
    
  # Visualizations  
  visualizations:
    enabled: true
    library: "plotly"  # plotly, matplotlib
    formats:
      - "png"
      - "html"
      - "svg"
    graphs:
      - "citation_network"
      - "temporal_trends"
      - "keyword_clouds"
      - "author_collaboration"
      - "research_gaps"

# Web Interface
web_interface:
  # FastAPI Configuration
  fastapi:
    enabled: true
    host: "0.0.0.0"
    port: 8000
    debug: false
    reload: true
    cors_enabled: true
    cors_origins:
      - "http://localhost:3000"
      - "http://localhost:8001"
      
  # Chainlit Configuration  
  chainlit:
    enabled: true
    host: "0.0.0.0"
    port: 8001
    auth_secret: "${CHAINLIT_AUTH_SECRET}"
    session_timeout: 3600
    
  # Interface Features
  features:
    mode_selection: true
    real_time_updates: true
    export_reports: true
    session_management: true
    progress_tracking: true

# Logging Configuration
logging:
  level: "INFO"
  
  # Console Logging
  console:
    enabled: true
    format: "structured"
    level: "INFO"
    
  # File Logging
  file:
    enabled: true
    directory: "./logs"
    filename: "research_agent.log"
    level: "DEBUG"
    max_size_mb: 10
    backup_count: 5
    
  # JSONL Logging
  jsonl:
    enabled: true
    directory: "./logs"
    filename: "research_events.jsonl"
    events:
      - "query_start"
      - "literature_search"
      - "tier_processing"
      - "report_generation"
      - "query_complete"

# Performance Configuration
performance:
  # Concurrency
  max_concurrent_requests: 10
  request_timeout: 120
  batch_processing: true
  batch_size: 5
  
  # Memory Management
  max_memory_mb: 4096
  gc_threshold: 0.8
  
  # Rate Limiting
  enable_rate_limiting: true
  requests_per_minute: 60
  burst_size: 10

# Security Configuration
security:
  # API Security
  api_key_enabled: false
  api_key: "${API_KEY}"
  
  # Data Privacy
  anonymize_data: false
  encrypt_cache: false
  secure_headers: true
  
  # Input Validation
  validate_inputs: true
  sanitize_queries: true
  max_query_length: 1000

# Development Settings
development:
  debug_mode: false
  mock_apis: false
  test_data_enabled: false
  hot_reload: true
  profiling_enabled: false
  
# Environment Override
# These can be overridden by environment variables
env_overrides:
  OPENAI_API_KEY: "llm_config.api_key"
  ANTHROPIC_API_KEY: "llm_config.api_key" 
  OLLAMA_HOST: "three_tier_rag.tier1_lightrag.ollama.host"
  CACHE_DIR: "caching.disk.directory"
  LOG_LEVEL: "logging.level"