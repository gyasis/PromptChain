# Research Agent Configuration
# Main configuration file for the 3-tier RAG research system

# System Configuration
system:
  name: "Research Agent System"
  version: "0.1.0"
  description: "Advanced research agent with 3-tier RAG, literature search, and PromptChain orchestration"

# Literature Search Configuration
literature_search:
  # Available sources: sci_hub, arxiv, pubmed
  enabled_sources:
    - sci_hub
    - arxiv
    - pubmed
  
  # Sci-Hub MCP Configuration
  sci_hub:
    enabled: true
    timeout: 120  # seconds
    rate_limit: 10  # requests per minute
    retry_attempts: 3
    cache_pdfs: true
    pdf_storage: "./data/cache/pdfs"
  
  # ArXiv Configuration
  arxiv:
    enabled: true
    timeout: 30
    rate_limit: 30  # requests per minute
    categories:
      - "cs.AI"
      - "cs.CL" 
      - "cs.LG"
      - "stat.ML"
      - "q-bio"
    max_results: 50
  
  # PubMed Configuration
  pubmed:
    enabled: true
    timeout: 30
    rate_limit: 10  # requests per second
    email: "${OPENALEX_EMAIL}"  # Required for PubMed
    tool_name: "research-agent"
    max_results: 50

# 3-Tier RAG System Configuration
three_tier_rag:
  # Execution mode: sequential, parallel, adaptive
  execution_mode: "sequential"
  
  # Tier 1: LightRAG (Entity Extraction)
  tier1_lightrag:
    enabled: true
    mode: "ollama"  # cloud, ollama, hybrid
    
    # Cloud API Configuration
    cloud:
      llm_model: "gpt-4o-mini"
      embedding_model: "text-embedding-3-large"
      temperature: 0.1
      
    # Ollama Configuration
    ollama:
      host: "http://localhost:11434"
      llm_model: "mistral-nemo:latest"
      embedding_model: "bge-m3:latest"
      embedding_dim: 1024
      context_window: 16384
      
    # LightRAG Processing Settings
    processing:
      chunk_size: 1200
      chunk_overlap: 100
      max_parallel_insert: 2
      llm_model_max_async: 4
      entity_extract_max_gleaning: 1
      working_dir: "./data/lightrag_working"
      
    # PDF Processing
    pdf_processing:
      use_textract: true
      extract_images: false
      extract_tables: true
      ocr_enabled: false
  
  # Tier 2: PaperQA2 (Research Analysis)
  tier2_paperqa2:
    enabled: true
    mode: "ollama"  # cloud, ollama
    
    # Cloud API Configuration
    cloud:
      llm: "gpt-4o-2024-11-20"
      summary_llm: "gpt-4o-2024-11-20"
      embedding: "text-embedding-3-small"
      temperature: 0.0
      
    # Ollama Configuration
    ollama:
      llm: "ollama/llama3.2"
      summary_llm: "ollama/llama3.2"
      embedding: "ollama/mxbai-embed-large"
      api_base: "http://localhost:11434"
      
    # PaperQA2 Settings
    settings:
      batch_size: 1
      verbosity: 1
      answer:
        evidence_k: 10
        evidence_detailed_citations: true
        evidence_retrieval: true
        evidence_summary_length: "about 100 words"
        answer_max_sources: 5
        answer_length: "about 200 words, but can be longer"
        max_concurrent_requests: 4
      parsing:
        chunk_size: 5000
        overlap: 250
        page_size_limit: "1,280,000"
        use_doc_details: true
        
    # Paper Processing
    paper_processing:
      auto_citation: true
      auto_metadata: true
      pdf_parsing: "grobid"  # grobid, textract, pymupdf
      
  # Tier 3: GraphRAG (Knowledge Graph Reasoning)
  tier3_graphrag:
    enabled: true
    mode: "ollama"  # cloud, ollama
    
    # Cloud API Configuration
    cloud:
      extraction_model: "gpt-4o-mini"
      query_model: "gpt-4"
      embedding_model: "text-embedding-3-large"
      
    # Ollama Configuration
    ollama:
      extraction_model: "llama3.2"
      query_model: "mistral"
      embedding_model: "bge-m3"
      api_base: "http://localhost:11434"
      
    # GraphRAG Settings
    settings:
      max_retries: 20
      chunk_size: 300
      chunk_overlap: 100
      entity_types:
        - "organization"
        - "person" 
        - "geo"
        - "event"
        - "concept"
        - "method"
      max_gleanings: 1
      
    # Graph Processing
    graph_processing:
      community_detection: true
      max_data_tokens: 12000
      concurrent_coroutines: 32
      json_mode: true

# PromptChain Integration
promptchain:
  # Agent Configuration
  agent_chain:
    execution_mode: "router"  # router, pipeline, round_robin, broadcast
    max_agents: 5
    cache_enabled: true
    cache_name: "research_session"
    cache_path: "./data/cache"
    verbose: true
    
  # Research Agents
  agents:
    literature_searcher:
      model: "openai/gpt-4o-mini"
      instructions:
        - "Search for relevant academic papers: {input}"
        - "Extract key information and metadata"
      tools:
        - "mcp_scihub_search_by_keyword"
        - "arxiv_search"
        - "pubmed_search"
        
    entity_extractor:
      model: "openai/gpt-4o-mini"
      instructions:
        - "Extract entities and relationships from: {input}"
      processor: "agentic_step"
      max_internal_steps: 3
      
    research_analyzer:
      model: "anthropic/claude-3-sonnet-20240229"
      instructions:
        - "Analyze research papers: {input}"
        - "Generate comprehensive analysis"
      processor: "agentic_step"
      max_internal_steps: 5
      
    report_generator:
      model: "openai/gpt-4o"
      instructions:
        - "Generate research report: {input}"
        - "Include statistics, graphs, and tables"
        
  # Router Configuration
  router:
    model: "openai/gpt-4o-mini"
    decision_templates:
      single_agent_dispatch: |
        Based on the user request: {user_input}
        Available agents: {agent_details}
        Conversation history: {history}
        Choose the most appropriate agent and return JSON:
        {"chosen_agent": "agent_name", "refined_query": "optional refined query"}

# MCP Server Configuration
mcp_servers:
  # Context7 for library documentation
  context7:
    enabled: true
    server_type: "context7"
    
  # Gemini for pair programming  
  gemini:
    enabled: true
    server_type: "gemini_mcp_server"
    
  # Git for version tracking
  git:
    enabled: true
    server_type: "git"
    
  # Sci-Hub MCP
  scihub:
    enabled: true
    server_type: "stdio"
    command: "uv"
    args: ["run", "fastmcp", "dev", "sci_hub_server.py"]
    cwd: "./integrations/scihub_mcp"

# Caching Configuration
caching:
  enabled: true
  
  # Memory Cache
  memory:
    size_mb: 500
    ttl_seconds: 3600
    
  # Disk Cache
  disk:
    enabled: true
    directory: "./data/cache"
    size_mb: 2000
    cleanup_interval: 86400
    
  # Redis Cache (optional)
  redis:
    enabled: false
    url: "${REDIS_URL}"
    ttl_seconds: 86400
    
  # Database Cache
  database:
    enabled: true
    path: "./data/research_cache.db"
    session_timeout: 3600

# Report Generation
report_generation:
  # Output formats
  formats:
    - "markdown"
    - "html" 
    - "pdf"
    - "json"
    
  # Report sections
  sections:
    executive_summary: true
    methodology: true
    findings: true
    statistics: true
    visualizations: true
    references: true
    appendix: false
    
  # Statistics and Analytics
  statistics:
    paper_count: true
    citation_analysis: true
    temporal_analysis: true
    keyword_frequency: true
    author_networks: true
    
  # Visualizations  
  visualizations:
    enabled: true
    library: "plotly"  # plotly, matplotlib
    formats:
      - "png"
      - "html"
      - "svg"
    graphs:
      - "citation_network"
      - "temporal_trends"
      - "keyword_clouds"
      - "author_collaboration"
      - "research_gaps"

# Web Interface
web_interface:
  # FastAPI Configuration
  fastapi:
    enabled: true
    host: "0.0.0.0"
    port: 8000
    debug: false
    reload: true
    cors_enabled: true
    cors_origins:
      - "http://localhost:3000"
      - "http://localhost:8001"
      
  # Chainlit Configuration  
  chainlit:
    enabled: true
    host: "0.0.0.0"
    port: 8001
    auth_secret: "${CHAINLIT_AUTH_SECRET}"
    session_timeout: 3600
    
  # Interface Features
  features:
    mode_selection: true
    real_time_updates: true
    export_reports: true
    session_management: true
    progress_tracking: true

# Logging Configuration
logging:
  level: "INFO"
  
  # Console Logging
  console:
    enabled: true
    format: "structured"
    level: "INFO"
    
  # File Logging
  file:
    enabled: true
    directory: "./logs"
    filename: "research_agent.log"
    level: "DEBUG"
    max_size_mb: 10
    backup_count: 5
    
  # JSONL Logging
  jsonl:
    enabled: true
    directory: "./logs"
    filename: "research_events.jsonl"
    events:
      - "query_start"
      - "literature_search"
      - "tier_processing"
      - "report_generation"
      - "query_complete"

# Performance Configuration
performance:
  # Concurrency
  max_concurrent_requests: 10
  request_timeout: 120
  batch_processing: true
  batch_size: 5
  
  # Memory Management
  max_memory_mb: 4096
  gc_threshold: 0.8
  
  # Rate Limiting
  enable_rate_limiting: true
  requests_per_minute: 60
  burst_size: 10

# Security Configuration
security:
  # API Security
  api_key_enabled: false
  api_key: "${API_KEY}"
  
  # Data Privacy
  anonymize_data: false
  encrypt_cache: false
  secure_headers: true
  
  # Input Validation
  validate_inputs: true
  sanitize_queries: true
  max_query_length: 1000

# Development Settings
development:
  debug_mode: false
  mock_apis: false
  test_data_enabled: false
  hot_reload: true
  profiling_enabled: false
  
# Environment Override
# These can be overridden by environment variables
env_overrides:
  OPENAI_API_KEY: "llm_config.api_key"
  ANTHROPIC_API_KEY: "llm_config.api_key" 
  OLLAMA_HOST: "three_tier_rag.tier1_lightrag.ollama.host"
  CACHE_DIR: "caching.disk.directory"
  LOG_LEVEL: "logging.level"