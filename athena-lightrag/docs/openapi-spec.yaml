openapi: 3.0.3
info:
  title: Athena LightRAG MCP Server API
  description: |
    Advanced RAG capabilities via Model Context Protocol for health database queries.
    
    This API provides multi-hop reasoning capabilities using PromptChain's AgenticStepProcessor 
    and LightRAG knowledge graph for intelligent querying of medical database structures.
    
    The server implements the Model Context Protocol (MCP) specification and provides both
    stdio (standard MCP) and HTTP (testing) transports.
    
    ## Features
    - Multi-hop reasoning with AgenticStepProcessor
    - LightRAG knowledge graph integration  
    - 4 specialized query modes (local, global, hybrid, naive)
    - Context accumulation strategies for complex analysis
    - FastMCP 2025 compliant implementation
    
    ## Transport Modes
    - **stdio**: Standard MCP transport for Claude Desktop and other MCP clients
    - **http**: HTTP transport for testing and integration (port 8080 by default)
    
  version: 0.1.0
  contact:
    name: PromptChain Team
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: HTTP testing server (when --http flag is used)
  - url: stdio://
    description: Standard MCP stdio transport (default)

paths:
  /tools/query_athena:
    post:
      tags:
        - Basic Queries
      summary: Execute basic query against Athena medical database
      description: |
        Execute a basic query against the Athena medical database using LightRAG.
        
        This endpoint provides direct access to the LightRAG knowledge graph with
        different query modes optimized for various types of questions.
        
        **Query Modes:**
        - `local`: Focus on specific entities and relationships
        - `global`: High-level overviews and system-wide analysis  
        - `hybrid`: Combines local detail with global context (recommended)
        - `naive`: Simple keyword-based retrieval
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: The question or query about the medical database
                  example: "What tables are related to patient appointments?"
                mode:
                  type: string
                  enum: [local, global, hybrid, naive]
                  default: hybrid
                  description: Query strategy mode
                context_only:
                  type: boolean
                  default: false
                  description: If true, returns only the retrieved context without LLM generation
                top_k:
                  type: integer
                  default: 60
                  minimum: 1
                  maximum: 200
                  description: Number of top results to retrieve from the knowledge graph
            examples:
              simple_query:
                summary: Simple table inquiry
                value:
                  query: "What tables store patient information?"
                  mode: "local"
              complex_query:
                summary: Complex relationship query
                value:
                  query: "How do scheduling and billing systems interact?"
                  mode: "hybrid"
                  top_k: 30
      responses:
        '200':
          description: Successful query response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    description: The answer to the query based on the Athena medical database
                  metadata:
                    type: object
                    properties:
                      query_mode:
                        type: string
                      context_only:
                        type: boolean
                      top_k:
                        type: integer
                      processing_time:
                        type: number
              examples:
                basic_response:
                  summary: Basic query response
                  value:
                    result: "The patient appointments system involves several interconnected tables: patient_appointments (main scheduling), patients (demographic data), providers (healthcare staff), appointment_types (procedure categories), and scheduling_slots (availability)."
                    metadata:
                      query_mode: "hybrid"
                      context_only: false
                      top_k: 60
                      processing_time: 4.2
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tools/query_athena_reasoning:
    post:
      tags:
        - Multi-hop Reasoning
      summary: Execute complex multi-hop reasoning query
      description: |
        Execute a complex multi-hop reasoning query against the Athena medical database.
        
        This endpoint uses advanced agentic reasoning to break down complex questions,
        perform multiple related queries, and synthesize comprehensive answers.
        Perfect for questions requiring analysis across multiple database entities.
        
        **Context Accumulation Strategies:**
        - `incremental`: Builds context step-by-step through reasoning chain
        - `comprehensive`: Gathers broad context from multiple perspectives
        - `focused`: Targets specific areas with deep analysis
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Complex question requiring multi-step reasoning and analysis
                  example: "How do anesthesia workflows connect to patient scheduling and billing systems?"
                context_strategy:
                  type: string
                  enum: [incremental, comprehensive, focused]
                  default: incremental
                  description: How to accumulate context across reasoning steps
                mode:
                  type: string
                  enum: [local, global, hybrid, naive]
                  default: hybrid
                  description: LightRAG query mode for each reasoning step
                max_reasoning_steps:
                  type: integer
                  default: 5
                  minimum: 1
                  maximum: 10
                  description: Maximum number of reasoning iterations
            examples:
              workflow_analysis:
                summary: Complex workflow analysis
                value:
                  query: "How do anesthesia workflows connect to patient scheduling and billing systems?"
                  context_strategy: "comprehensive"
                  max_reasoning_steps: 4
              system_integration:
                summary: System integration query
                value:
                  query: "Analyze the data flow from patient registration through discharge and billing"
                  context_strategy: "incremental"
                  mode: "hybrid"
                  max_reasoning_steps: 6
      responses:
        '200':
          description: Successful multi-hop reasoning response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    description: Comprehensive answer synthesized from multi-hop reasoning process
                  metadata:
                    type: object
                    properties:
                      reasoning_steps:
                        type: integer
                        description: Number of reasoning steps executed
                      context_strategy:
                        type: string
                      processing_time:
                        type: number
                      intermediate_results:
                        type: array
                        items:
                          type: string
                        description: Step-by-step reasoning outputs
              examples:
                reasoning_response:
                  summary: Multi-hop reasoning response
                  value:
                    result: "Through multi-hop reasoning analysis:\n\n1. **Scheduling Integration**: Anesthesia workflows begin with surgical scheduling where anesthesia_assignments link to patient_appointments, ensuring proper anesthesiologist allocation.\n\n2. **Clinical Workflow**: The anesthesia_records table captures procedure details, medication administration, and timing data that feeds into both clinical documentation and billing.\n\n3. **Billing Connection**: Anesthesia services generate billable events through anesthesia_billing_codes linked to procedure_codes, which integrate with the general billing_transactions system.\n\n4. **Data Flow**: Patient scheduling → anesthesia assignment → procedure execution → clinical documentation → billing code generation → insurance processing."
                    metadata:
                      reasoning_steps: 4
                      context_strategy: "comprehensive"
                      processing_time: 35.7
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '408':
          description: Request timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tools/get_database_status:
    post:
      tags:
        - Database Information
      summary: Get database status and statistics
      description: |
        Get information about the Athena LightRAG database status and statistics.
        
        This endpoint provides metadata about the database including initialization status,
        file structure, and basic statistics. Useful for troubleshooting and
        understanding the current state of the knowledge graph.
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
              description: No parameters required
            example: {}
      responses:
        '200':
          description: Database status information
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    description: Formatted information about database status and statistics
                  metadata:
                    type: object
                    properties:
                      database_path:
                        type: string
                      database_exists:
                        type: boolean
                      initialized:
                        type: boolean
                      total_size_mb:
                        type: number
                      total_files:
                        type: integer
              examples:
                status_response:
                  summary: Database status response
                  value:
                    result: "Database Path: ./athena_lightrag_db\nDatabase Exists: True\nInitialized: True\nTotal Size: 125.3 MB\nTotal Files: 847\nDatabase Files: entities.json, relationships.json, communities.json, graph_chunk_entity_relation.json"
                    metadata:
                      database_path: "./athena_lightrag_db"
                      database_exists: true
                      initialized: true
                      total_size_mb: 125.3
                      total_files: 847
        '500':
          description: Database access error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tools/get_query_mode_help:
    post:
      tags:
        - Documentation
      summary: Get query mode and strategy documentation
      description: |
        Get detailed information about LightRAG query modes and context accumulation strategies.
        
        This endpoint returns comprehensive documentation about when and how to use
        different query modes and reasoning strategies for optimal results.
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
              description: No parameters required
            example: {}
      responses:
        '200':
          description: Query mode documentation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    description: Comprehensive guide to query modes and context strategies
              examples:
                help_response:
                  summary: Query mode help response
                  value:
                    result: "🔍 LightRAG Query Modes Guide:\n\n📍 LOCAL MODE:\n- Best for: Specific entity relationships, detailed technical questions\n- Use when: Asking about particular tables, fields, or specific components\n- Example: \"What are the columns in the patient_appointments table?\"\n\n🌍 GLOBAL MODE:\n- Best for: High-level overviews, system-wide analysis, summaries\n- Use when: Asking about overall architecture, general patterns, broad topics\n- Example: \"What are the main categories of tables in the database?\""

components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type identifier
          example: "ValidationError"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid query mode specified"
        details:
          type: object
          description: Additional error details
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
          description: Error occurrence timestamp
          example: "2025-01-15T10:30:00Z"
        
    QueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: The question or query string
          minLength: 1
          maxLength: 10000
          example: "What tables are related to patient data?"
        mode:
          type: string
          enum: [local, global, hybrid, naive]
          default: hybrid
          description: Query processing mode
        context_only:
          type: boolean
          default: false
          description: Return only context without generation
        top_k:
          type: integer
          default: 60
          minimum: 1
          maximum: 200
          description: Number of retrieval results

    ReasoningRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Complex query requiring reasoning
          minLength: 1
          maxLength: 10000
          example: "How do billing workflows integrate with clinical systems?"
        context_strategy:
          type: string
          enum: [incremental, comprehensive, focused]
          default: incremental
          description: Context accumulation strategy
        mode:
          type: string
          enum: [local, global, hybrid, naive]
          default: hybrid
          description: LightRAG query mode
        max_reasoning_steps:
          type: integer
          default: 5
          minimum: 1
          maximum: 10
          description: Maximum reasoning iterations

tags:
  - name: Basic Queries
    description: Direct LightRAG queries with various modes
  - name: Multi-hop Reasoning
    description: Complex reasoning queries using AgenticStepProcessor
  - name: Database Information
    description: Database status and metadata
  - name: Documentation
    description: Help and documentation endpoints

externalDocs:
  description: Full API Documentation
  url: /docs/api-reference.md