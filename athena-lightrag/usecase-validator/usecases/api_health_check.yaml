name: "API Health Check and Basic Functionality"
description: "Verify that all critical API endpoints are responding correctly"
tags: ["smoke", "api", "health"]
timeout: 60

setup:
  - "Verify API server is running and accessible"
  - "Check database connectivity"
  - "Ensure authentication service is available"

steps:
  - step: "Check API health endpoint"
    action: "GET /health"
    expect: "Status 200 and response indicates healthy status"
    
  - step: "Test authentication endpoint"
    action: "POST to /auth/login with invalid credentials"
    expect: "Status 401 and appropriate error message"
    
  - step: "Test protected endpoint without auth"
    action: "GET /users/profile"
    expect: "Status 401 and authentication required message"
    
  - step: "Test API version endpoint"
    action: "GET /api/version"
    expect: "Status 200 and version information returned"

validations:
  - "All endpoints respond within acceptable time limits"
  - "Error responses include proper HTTP status codes"
  - "API returns consistent response format"
  - "Database connections are working"
  - "Authentication service is functional"

cleanup:
  - "No cleanup required for health checks"

error_scenarios:
  - "API should return 503 if database is unavailable"
  - "API should return 500 for unexpected server errors"
  - "API should handle malformed requests gracefully"




