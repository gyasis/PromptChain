name: "Complete User Registration Flow"
description: "Validate that a new user can register, verify email, and complete their profile successfully"
tags: ["e2e", "auth", "user-management"]
timeout: 120

setup:
  - "Generate unique test user data with email, password, and personal details"
  - "Ensure the test email doesn't already exist in the system"
  - "Prepare profile data including address and phone number"

steps:
  - step: "Register new user"
    action: "POST to /auth/register with user email, password, firstName, lastName"
    expect: "Status 201 and response contains userId and token"
    
  - step: "Verify email address"
    action: "POST to /auth/verify-email with userId and verification code"
    expect: "Status 200 and email verification confirmed"
    
  - step: "Complete user profile"
    action: "POST to /users/profile with profile data using auth token"
    data: "Include dateOfBirth, phoneNumber, and address"
    expect: "Status 200 and profile created successfully"
    
  - step: "Retrieve complete user information"
    action: "GET /users/{userId} using auth token"
    expect: "Status 200 and all user data is present and correct"

validations:
  - "User email matches the registered email"
  - "User status is 'active'"
  - "Email is marked as verified"
  - "Profile information is correctly stored"
  - "User appears in database with correct data"
  - "Created and updated timestamps are present"

cleanup:
  - "Delete the created user account"
  - "Remove user data from database"
  - "Clean up any associated records"

error_scenarios:
  - "Attempt to register with duplicate email should fail with 409"
  - "Invalid verification code should fail with 400"
  - "Profile update without auth token should fail with 401"




