# Example PromptChain CLI Configuration Export
# Version: 1.0
#
# This file can be imported into another session using:
#   /config import example_config_export.yml
#
# Generated by: /config export command (T111)

version: '1.0'

session:
  name: production-workflow
  working_directory: /home/user/projects/myproject
  active_agent: researcher
  default_model: openai/gpt-4.1-mini-2025-04-14
  auto_save_enabled: true

agents:
  researcher:
    model: openai/gpt-4
    description: Research specialist with web search and file access
    tools:
    - web_search
    - mcp_filesystem_read
    - mcp_filesystem_write
    history_config:
      enabled: true
      max_tokens: 8000
      max_entries: 50
      truncation_strategy: oldest_first

  coder:
    model: openai/gpt-4
    description: Code generation and refactoring specialist
    tools:
    - mcp_filesystem_read
    - mcp_filesystem_write
    - execute_code
    - mcp_git_status
    history_config:
      enabled: true
      max_tokens: 6000
      max_entries: 30
      truncation_strategy: oldest_first

  analyst:
    model: anthropic/claude-3-sonnet-20240229
    description: Data analysis and insights specialist
    tools:
    - mcp_snowflake_read_query
    - mcp_tableau_view_get_data
    history_config:
      enabled: true
      max_tokens: 8000
      max_entries: 50
      truncation_strategy: oldest_first

  terminal:
    model: openai/gpt-3.5-turbo
    description: Fast terminal command execution (no history)
    tools:
    - execute_shell
    history_config:
      enabled: false
      max_tokens: 0
      max_entries: 0
      truncation_strategy: oldest_first

mcp_servers:
- id: filesystem
  type: stdio
  command: npx
  args:
  - -y
  - '@modelcontextprotocol/server-filesystem'
  - /home/user/projects
  auto_connect: true

- id: snowflake
  type: stdio
  command: mcp-server-snowflake
  args:
  - --account
  - myaccount.snowflakecomputing.com
  auto_connect: false

- id: git
  type: stdio
  command: mcp-server-git
  args:
  - --repo
  - /home/user/projects/myproject
  auto_connect: true

orchestration:
  execution_mode: router
  auto_include_history: true
  router_config:
    model: openai/gpt-4o-mini
    timeout_seconds: 10

history_configuration:
  per_agent:
    researcher:
      enabled: true
      max_tokens: 8000
      max_entries: 50
      truncation_strategy: oldest_first
    coder:
      enabled: true
      max_tokens: 6000
      max_entries: 30
      truncation_strategy: oldest_first
    analyst:
      enabled: true
      max_tokens: 8000
      max_entries: 50
      truncation_strategy: oldest_first
    terminal:
      enabled: false
      max_tokens: 0
      max_entries: 0
      truncation_strategy: oldest_first
